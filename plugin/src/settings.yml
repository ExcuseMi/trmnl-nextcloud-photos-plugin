---
strategy: polling
no_screen_padding: 'yes'
dark_mode: 'no'
static_data: ''
polling_verb: post
framework_version: 
serverless_language: 
polling_url: https://trmnl.bettens.dev/nextcloud/image
polling_headers: 'Content-Type: application/json'
polling_body: '{"nextcloud_url":"{{ trmnl.plugin_settings.custom_fields_values.nextcloud_url }}","username":"{{ trmnl.plugin_settings.custom_fields_values.username }}","token":"{{ trmnl.plugin_settings.custom_fields_values.app_token }}","folder":"{{ trmnl.plugin_settings.custom_fields_values.folder_path }}","mode":"{{ trmnl.plugin_settings.custom_fields_values.selection_mode }}","recursive":"{{ trmnl.plugin_settings.custom_fields_values.recursive }}"}'
id: 285470
custom_fields:
- keyname: author_info
  name: About This Plugin
  field_type: author_bio
  description: Display images from your Nextcloud instance on your TRMNL e-paper display.
  github_url: https://github.com/ExcuseMi/trmnl-nextcloud-image-plugin
  category: images
  help_text: TRMNL X Ready
- keyname: nextcloud_url
  field_type: url
  name: Nextcloud URL
  description: Your Nextcloud instance URL
  placeholder: https://nextcloud.example.com
  group: Connection
  optional: false
- keyname: username
  field_type: string
  name: Username
  description: Nextcloud username
  placeholder: your_username
  group: Connection
  optional: false
- keyname: app_token
  field_type: password
  name: App Password / Token
  description: 'Generate in Nextcloud: Settings → Security → App passwords'
  group: Connection
  optional: false
- keyname: folder_path
  field_type: string
  name: Folder Path
  description: Path to the folder containing images (relative to your files root)
  placeholder: "/Photos/Wallpapers"
  group: Images
  optional: false
- keyname: selection_mode
  field_type: select
  name: Selection Mode
  description: How to pick the image to display
  options:
  - Sequential: sequential
  - Shuffle: shuffle
  - Random: random
  - Newest: newest
  - Oldest: oldest
  default: sequential
  group: Images
  optional: true
- keyname: recursive
  field_type: boolean
  name: Include Subfolders
  description: Scan subfolders recursively for images
  default: 'true'
  group: Images
  optional: true
- keyname: fill_screen
  field_type: boolean
  name: Fill Screen
  description: Cover the full display (may crop). Off = fit within display (preserves full image).
  default: 'false'
  group: Display
  optional: true
- keyname: hide_titlebar
  field_type: boolean
  name: Hide Title Bar
  description: Remove the title bar for a cleaner full-image display.
  default: 'false'
  group: Display
  optional: true
name: Nextcloud Image
refresh_interval: 60
