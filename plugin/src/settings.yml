---
strategy: polling
no_screen_padding: 'yes'
dark_mode: 'no'
static_data: ''
polling_verb: post
framework_version: 2.3.7
serverless_language: node
polling_url: "{{ trmnl.plugin_settings.custom_fields_values.backend_url | default: 'https://trmnl.bettens.dev/nextcloud/image' }}"
polling_headers: 'Content-Type: application/json'
polling_body: '{"nextcloud_url":"{{ trmnl.plugin_settings.custom_fields_values.nextcloud_url }}","username":"{{ trmnl.plugin_settings.custom_fields_values.username }}","token":"{{ trmnl.plugin_settings.custom_fields_values.app_token }}","folder":"{{ trmnl.plugin_settings.custom_fields_values.folder_path }}","mode":"{{ trmnl.plugin_settings.custom_fields_values.selection_mode }}","recursive":"{{ trmnl.plugin_settings.custom_fields_values.recursive }}","device":{"width":{{ trmnl.device.width | default: 800 }},"height":{{ trmnl.device.height | default: 480 }}}}'
id: 285470
oauth_enabled: 'false'
oauth_pkce_enabled: 'no'
oauth_authorize_url: ''
oauth_token_url: ''
oauth_scopes: ''
oauth_scope_separator: ''
oauth_refresh_url: ''
oauth_auth_params: ''
oauth_token_headers: ''
oauth_token_site: ''
oauth_token_params: ''
oauth_token_request_auth_method: ''
oauth_body_format: ''
oauth_token_response_metadata: ''
oauth_authorization_method: ''
oauth_refresh_params: ''
oauth_token_field_name: ''
oauth_expiry_field_name: ''
oauth_expiry_strategy: ''
oauth_fixed_expiry_ms: ''
custom_fields:
- keyname: author_info
  name: About This Plugin
  field_type: author_bio
  description: Show photos from your Nextcloud on your TRMNL display.<br><br><strong>Note:</strong> Requests are proxied through <code>trmnl.bettens.dev</code> because TRMNL cannot authenticate with Nextcloud directly. Credentials are never stored — only used to fetch images on demand.
  github_url: https://github.com/ExcuseMi/trmnl-nextcloud-photos-plugin
  category: images,album
  help_text: TRMNL X Ready
- keyname: nextcloud_url
  field_type: url
  name: Nextcloud URL
  description: Your Nextcloud instance URL
  placeholder: https://nextcloud.example.com
  optional: false
- keyname: username
  field_type: string
  name: Username
  description: Nextcloud username
  placeholder: your_username
  optional: false
- keyname: app_token
  field_type: password
  name: App Password / Token
  description: 'Generate in Nextcloud: Settings → Security → App passwords'
  optional: false
- keyname: folder_path
  field_type: string
  name: Folder or File Path
  description: Path to a folder of images, or a single image file. Relative to your files root.
  placeholder: "/Photos/Wallpapers"
  optional: false
- keyname: selection_mode
  field_type: select
  name: Selection Mode
  description: 'Sequential: cycle in order.<br />Shuffle: random order, no repeats.<br />Random: random each time.<br />Newest/Oldest: by date modified.'
  options:
  - Sequential: sequential
  - Shuffle: shuffle
  - Random: random
  - Newest: newest
  - Oldest: oldest
  default: sequential
  optional: true
- keyname: recursive
  field_type: boolean
  name: Include Subfolders
  description: Scan subfolders recursively for images
  default: 'true'
  optional: true
- keyname: canvas_mode
  field_type: boolean
  name: Canvas Mode
  description: Fill the display edge-to-edge (may crop). Off = fit the full image with padding.
  default: 'false'
  optional: true
- keyname: metadata_fields
  field_type: select
  multiple: true
  name: Metadata Overlay
  description: Choose what appears in the overlay at the bottom of the image. Leave empty to hide the overlay.
  options:
  - Date taken: date
  - Location: gps
  - Camera: camera
  - Exposure (f / shutter / ISO): exposure
  - Focal length: focal
  - Megapixels: dimensions
  - File size: filesize
  - Filename: filename
  - Parent folder: folder
  - Photo count: count
  optional: true
- keyname: backend_url
  field_type: url
  name: Custom Backend URL
  description: 'Advanced: URL of your self-hosted backend. Default is <code>https://trmnl.bettens.dev/nextcloud/image</code>.'
  placeholder: https://trmnl.bettens.dev/nextcloud/image
  default: https://trmnl.bettens.dev/nextcloud/image
  optional: true
name: Nextcloud Photos
refresh_interval: 15
