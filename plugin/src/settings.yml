---
strategy: polling
no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: post
framework_version: 
serverless_language: 
polling_url: https://trmnl.bettens.dev/nextcloud/image
polling_headers: 'Content-Type: application/json'
polling_body: '{"nextcloud_url":"{{ trmnl.plugin_settings.custom_fields_values.nextcloud_url }}","username":"{{ trmnl.plugin_settings.custom_fields_values.username }}","token":"{{ trmnl.plugin_settings.custom_fields_values.app_token }}","folder":"{{ trmnl.plugin_settings.custom_fields_values.folder_path }}","mode":"{{ trmnl.plugin_settings.custom_fields_values.selection_mode }}","recursive":"{{ trmnl.plugin_settings.custom_fields_values.recursive }}","device":{"width":{{ trmnl.device.width | default: 800 }},"height":{{ trmnl.device.height | default: 480 }}}}'
id: 285470
custom_fields:
- keyname: author_info
  name: About This Plugin
  field_type: author_bio
  description: Display images from your Nextcloud instance on your TRMNL e-paper display.<br><br><strong>Note:</strong> This plugin routes requests through a personal backend (<code>trmnl.bettens.dev</code>). This is required because Nextcloud images are protected by authentication — TRMNL cannot supply credentials when fetching images directly.<br><br>Your credentials are never stored and are only used to retrieve images on demand.
  github_url: https://github.com/ExcuseMi/trmnl-nextcloud-image-plugin
  category: images
  help_text: TRMNL X Ready
- keyname: nextcloud_url
  field_type: url
  name: Nextcloud URL
  description: Your Nextcloud instance URL
  placeholder: https://nextcloud.example.com
  optional: false
- keyname: username
  field_type: string
  name: Username
  description: Nextcloud username
  placeholder: your_username
  optional: false
- keyname: app_token
  field_type: password
  name: App Password / Token
  description: 'Generate in Nextcloud: Settings → Security → App passwords'
  optional: false
- keyname: folder_path
  field_type: string
  name: Folder or File Path
  description: Path to a folder of images, or a single image file. Relative to your files root.
  placeholder: "/Photos/Wallpapers"
  optional: false
- keyname: selection_mode
  field_type: select
  name: Selection Mode
  description: 'Sequential: cycle in order. Shuffle: random order, no repeats. Random: random each time. Newest/Oldest: by date modified.'
  options:
  - Sequential: sequential
  - Shuffle: shuffle
  - Random: random
  - Newest: newest
  - Oldest: oldest
  default: sequential
  optional: true
- keyname: recursive
  field_type: boolean
  name: Include Subfolders
  description: Scan subfolders recursively for images
  default: 'true'
  optional: true
- keyname: canvas_mode
  field_type: boolean
  name: Canvas Mode
  description: Fill the display edge-to-edge (may crop). Off = fit the full image with padding.
  default: 'false'
  optional: true
- keyname: metadata_fields
  field_type: select
  multiple: true
  name: Metadata Overlay
  description: Choose what appears in the overlay at the bottom of the image. Leave empty to hide the overlay.
  options:
  - Date taken: date
  - Camera: camera
  - Exposure (f / shutter / ISO): exposure
  - Focal length: focal
  - Megapixels: dimensions
  - File size: filesize
  - Location: gps
  - Photo count: count
  optional: true
name: Nextcloud Images
refresh_interval: 15
