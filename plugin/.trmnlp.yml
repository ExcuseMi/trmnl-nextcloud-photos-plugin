# TRMNLP configuration
# {{ env.VARIABLE }} interpolation is available here
---
watch:
  - .trmnlp.yml
  - src

custom_fields: {}

variables:
  trmnl:
    system:
      timestamp_utc: 1700000000
    plugin_settings:
      instance_name: "Nextcloud Image"
      strategy: polling
      dark_mode: "no"
      no_screen_padding: "no"
      custom_fields_values:
        nextcloud_url: "https://nextcloud.example.com"
        username: "testuser"
        app_token: "test-token"
        folder_path: "/Photos"
        selection_mode: "random"
        canvas_mode: "false"
        metadata_fields: '["date","camera","exposure","count"]'
  image:
    url: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/PNG_transparency_demonstration_1.png/280px-PNG_transparency_demonstration_1.png"
    path: "/Photos/Wallpapers/sample.png"
    folder_count: 42
    seq_position: 3
    bg_class: "bg--gray-60"
  meta:
    date_ts: 1744588800
    filename: "sample.png"
    camera: "Apple iPhone 15 Pro"
    exposure: "f/1.78 · 1/120s · ISO\u00A0400"
    focal: "24mm"
    megapixels: "12 MP"
    file_size: "3.2\u00A0MB"
    gps: "Brussels"
